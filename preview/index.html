<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAG Visualizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@logicflow/core@2.1.11/dist/index.css" />
  <script src="https://cdn.jsdelivr.net/npm/@logicflow/core@2.1.11/dist/index.min.js"></script>
  <style>
    #canvas { width: 100%; height: calc(100vh - 140px); }
    .lf-node-text { font-size: 12px !important; }
    .lf-edge-text { fill: #dc2626 !important; font-size: 12px !important; font-weight: 500 !important; }
    .lf-edge-text-bg { fill: #ffffff !important; stroke: transparent !important; }
  </style>
</head>
<body class="bg-white text-gray-900 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="border-b border-gray-200 px-6 py-4">
    <div class="flex items-center justify-between max-w-7xl mx-auto">
      <h1 class="text-xl font-semibold tracking-tight">DAG Visualizer</h1>
      <div class="flex items-center gap-4">
        <select id="run-select" class="bg-white border border-gray-300 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Loading runs...</option>
        </select>
        <div id="view-toggle" class="flex items-center bg-gray-100 border border-gray-300 rounded-md overflow-hidden text-sm">
          <button data-view="plan" class="px-3 py-1.5 transition-colors bg-blue-600 text-white">Plan</button>
          <button data-view="result" class="px-3 py-1.5 transition-colors text-gray-500 hover:text-gray-800">Result</button>
        </div>
        <button id="btn-refresh" class="bg-white hover:bg-gray-100 border border-gray-300 rounded-md px-3 py-1.5 text-sm transition-colors">
          Refresh
        </button>
      </div>
    </div>
  </header>

  <!-- DAG info bar -->
  <div id="dag-info" class="border-b border-gray-200 px-6 py-3 hidden">
    <div class="max-w-7xl mx-auto flex items-center gap-6 text-sm">
      <span class="text-gray-500">Run: <span id="info-run" class="text-gray-800 font-mono"></span></span>
      <span class="text-gray-500">Description: <span id="info-desc" class="text-gray-800"></span></span>
      <span class="text-gray-500">Nodes: <span id="info-nodes" class="text-gray-800"></span></span>
    </div>
  </div>

  <!-- Legend -->
  <div class="px-6 py-2 border-b border-gray-200">
    <div class="max-w-7xl mx-auto flex items-center gap-6 text-xs text-gray-500">
      <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-blue-600 inline-block"></span> Normal</span>
      <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-amber-600 inline-block"></span> Has fallback</span>
      <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-red-700 inline-block"></span> Fallback node</span>
      <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-green-600 inline-block"></span> Completed</span>
      <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-gray-400 inline-block"></span> Skipped</span>
      <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-red-500 inline-block"></span> Failed</span>
      <span class="flex items-center gap-1.5"><span class="border-t-2 border-dashed border-red-400 w-4 inline-block"></span> on_error edge</span>
    </div>
  </div>

  <!-- Canvas -->
  <main class="flex-1">
    <div id="canvas" class="border-t border-gray-100 bg-gray-50"></div>
  </main>

  <!-- Error -->
  <div id="error-banner" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-red-50 border border-red-300 text-red-700 px-6 py-3 rounded-lg text-sm max-w-lg text-center"></div>

  <script src="/static/app.js"></script>
</body>
</html>
